name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FTP_SERVER: 82.180.143.137
  FTP_USERNAME: u956615329.rudrajewellery.co.in
  FTP_PORT: 65002
  FTP_REMOTE_THEME: /public_html/wp-content/themes/jwellery-jewelry/
  FTP_REMOTE_PLUGIN: /public_html/wp-content/plugins/jewelry-upi-store/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy theme (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          port: ${{ env.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./wordpress-theme/jwellery-jewelry/*
          remote_path: ${{ env.FTP_REMOTE_THEME }}
          sftp_only: true
          sftpArgs: '-o ConnectTimeout=60 -o StrictHostKeyChecking=no'

      - name: Deploy plugin (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          port: ${{ env.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./wordpress-plugin/jewelry-upi-store/*
          remote_path: ${{ env.FTP_REMOTE_PLUGIN }}
          sftp_only: true
          sftpArgs: '-o ConnectTimeout=60 -o StrictHostKeyChecking=no'
