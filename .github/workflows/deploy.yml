name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'wordpress-theme/jwellery-jewelry/**'
      - 'wordpress-plugin/jewelry-upi-store/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy theme
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: wordpress-theme/jwellery-jewelry/
          server-dir: ${{ secrets.FTP_REMOTE_THEME }}

      - name: Deploy plugin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: wordpress-plugin/jewelry-upi-store/
          server-dir: ${{ secrets.FTP_REMOTE_PLUGIN }}
