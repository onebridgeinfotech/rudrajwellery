name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FTP_SERVER: 82.180.143.137
  FTP_USERNAME: u956615329.rudrajewellery.co.in
  FTP_PORT: 21

jobs:
  deploy-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy theme (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./wordpress-theme/jwellery-jewelry/
          server-dir: /wp-content/themes/jwellery-jewelry/
          dangerous-clean-slate: true

  deploy-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./wordpress-plugin/jewelry-upi-store/
          server-dir: /wp-content/plugins/jewelry-upi-store/
          dangerous-clean-slate: true
